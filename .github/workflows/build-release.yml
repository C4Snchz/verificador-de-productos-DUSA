name: Build & Release

on:
  push:
    tags:
      - 'v*'  # Se ejecuta cuando creas un tag como v1.0.0
  workflow_dispatch:  # También permite ejecutar manualmente

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build Windows executable
        run: |
          pyinstaller --onefile --noconsole --name "VerificadorDUSA" --icon "icon.ico" app_tuplanilla.py
        continue-on-error: true
      
      - name: Build Windows (fallback without icon)
        if: failure()
        run: |
          pyinstaller --onefile --noconsole --name "VerificadorDUSA" app_tuplanilla.py
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/VerificadorDUSA.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build Mac executable
        run: |
          pyinstaller --onefile --noconsole --name "VerificadorDUSA" app_tuplanilla.py
      
      - name: Create Mac ZIP
        run: |
          cd dist
          zip -r VerificadorDUSA-Mac.zip VerificadorDUSA
      
      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/VerificadorDUSA-Mac.zip

  create-release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: ./windows
      
      - name: Download Mac build
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: ./mac
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            windows/VerificadorDUSA.exe
            mac/VerificadorDUSA-Mac.zip
          body: |
            ## Verificador DUSA - ${{ github.ref_name }}
            
            ### Descargas:
            - **Windows**: `VerificadorDUSA.exe`
            - **Mac**: `VerificadorDUSA-Mac.zip` (descomprimir y ejecutar)
            
            ### Requisitos:
            - Google Chrome instalado
            - Conexión a internet
            
            ---
            Powered by [TuPlanilla.net](https://tuplanilla.net)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
