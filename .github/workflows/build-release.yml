name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow
      
      - name: Generate Windows icon
        run: |
          python -c "
          from PIL import Image, ImageDraw
          
          def create_tuplanilla_icon(size=256):
              '''Crea el ícono de Tu Planilla programáticamente'''
              img = Image.new('RGBA', (size, size), (0, 0, 0, 0))
              draw = ImageDraw.Draw(img)
              
              # Fondo con gradiente simulado (púrpura a rosa)
              for y in range(size):
                  r = int(147 + (236 - 147) * y / size)
                  g = int(51 + (72 - 51) * y / size)
                  b = int(234 + (153 - 234) * y / size)
                  draw.line([(0, y), (size, y)], fill=(r, g, b, 255))
              
              # Máscara para esquinas redondeadas
              mask = Image.new('L', (size, size), 0)
              mask_draw = ImageDraw.Draw(mask)
              radius = size // 5
              mask_draw.rounded_rectangle([0, 0, size-1, size-1], radius=radius, fill=255)
              img.putalpha(mask)
              
              # Dibujar el cubo 3D (logo Tu Planilla) en blanco
              cx, cy = size // 2, size // 2
              scale = size / 50  # Escalar desde el viewBox de 50x50
              
              # Puntos del cubo (del SVG original)
              points_top = [(25, 10), (38, 18), (25, 26), (12, 18)]
              points_top = [(int(x * scale), int(y * scale)) for x, y in points_top]
              
              # Líneas del cubo
              lines = [
                  ((12, 18), (12, 32)),
                  ((25, 26), (25, 40)),
                  ((38, 18), (38, 32)),
                  ((12, 32), (25, 40)),
                  ((25, 40), (38, 32)),
              ]
              
              line_width = max(2, int(2.5 * scale))
              
              # Dibujar polígono superior
              draw.polygon(points_top, outline='white', width=line_width)
              
              # Dibujar líneas
              for (x1, y1), (x2, y2) in lines:
                  draw.line([(int(x1*scale), int(y1*scale)), (int(x2*scale), int(y2*scale))], 
                           fill='white', width=line_width)
              
              return img
          
          # Crear ícono con múltiples tamaños para Windows
          sizes = [16, 32, 48, 64, 128, 256]
          icons = [create_tuplanilla_icon(s) for s in sizes]
          icons[0].save('icon.ico', format='ICO', append_images=icons[1:], sizes=[(s,s) for s in sizes])
          print('✅ icon.ico created with Tu Planilla logo')
          "
        shell: bash
      
      - name: Build Windows executable
        run: |
          pyinstaller --onefile --noconsole --name "VerificadorDUSA" --icon "icon.ico" --collect-all pandas --collect-all numpy --collect-all openpyxl --collect-all selenium --collect-all webdriver_manager --hidden-import=pandas._libs.tslibs.timedeltas --hidden-import=pandas._libs.tslibs.np_datetime --hidden-import=pandas._libs.tslibs.nattype --hidden-import=openpyxl.cell._writer --hidden-import=selenium.webdriver.chrome.service --hidden-import=selenium.webdriver.common.service app_escritorio_v2.py
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/VerificadorDUSA.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow
      
      - name: Generate Mac icon
        run: |
          python3 << 'EOF'
          from PIL import Image, ImageDraw
          import os
          
          def create_tuplanilla_icon(size=256):
              '''Crea el ícono de Tu Planilla programáticamente'''
              img = Image.new('RGBA', (size, size), (0, 0, 0, 0))
              draw = ImageDraw.Draw(img)
              
              # Fondo con gradiente simulado (púrpura a rosa)
              for y in range(size):
                  r = int(147 + (236 - 147) * y / size)
                  g = int(51 + (72 - 51) * y / size)
                  b = int(234 + (153 - 234) * y / size)
                  draw.line([(0, y), (size, y)], fill=(r, g, b, 255))
              
              # Máscara para esquinas redondeadas
              mask = Image.new('L', (size, size), 0)
              mask_draw = ImageDraw.Draw(mask)
              radius = size // 5
              mask_draw.rounded_rectangle([0, 0, size-1, size-1], radius=radius, fill=255)
              img.putalpha(mask)
              
              # Dibujar el cubo 3D (logo Tu Planilla) en blanco
              scale = size / 50
              
              # Puntos del cubo
              points_top = [(25, 10), (38, 18), (25, 26), (12, 18)]
              points_top = [(int(x * scale), int(y * scale)) for x, y in points_top]
              
              lines = [
                  ((12, 18), (12, 32)),
                  ((25, 26), (25, 40)),
                  ((38, 18), (38, 32)),
                  ((12, 32), (25, 40)),
                  ((25, 40), (38, 32)),
              ]
              
              line_width = max(2, int(2.5 * scale))
              draw.polygon(points_top, outline='white', width=line_width)
              
              for (x1, y1), (x2, y2) in lines:
                  draw.line([(int(x1*scale), int(y1*scale)), (int(x2*scale), int(y2*scale))], 
                           fill='white', width=line_width)
              
              return img
          
          # Crear iconset para Mac
          os.makedirs('icon.iconset', exist_ok=True)
          
          sizes = [16, 32, 64, 128, 256, 512]
          for size in sizes:
              icon = create_tuplanilla_icon(size)
              icon.save(f'icon.iconset/icon_{size}x{size}.png', 'PNG')
              if size <= 256:
                  icon2x = create_tuplanilla_icon(size * 2)
                  icon2x.save(f'icon.iconset/icon_{size}x{size}@2x.png', 'PNG')
          
          print('✅ iconset created with Tu Planilla logo')
          EOF
          
          iconutil -c icns icon.iconset -o icon.icns 2>/dev/null || echo "iconutil skipped"
      
      - name: Build Mac executable
        run: |
          if [ -f icon.icns ]; then
            pyinstaller --onefile --noconsole --name "VerificadorDUSA" --icon "icon.icns" --collect-all pandas --collect-all numpy --collect-all openpyxl --collect-all selenium --collect-all webdriver_manager app_escritorio_v2.py
          else
            pyinstaller --onefile --noconsole --name "VerificadorDUSA" --collect-all pandas --collect-all numpy --collect-all openpyxl --collect-all selenium --collect-all webdriver_manager app_escritorio_v2.py
          fi
      
      - name: Create Mac ZIP
        run: |
          cd dist
          zip -r VerificadorDUSA-Mac.zip VerificadorDUSA
      
      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/VerificadorDUSA-Mac.zip

  create-release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: ./windows
      
      - name: Download Mac build
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: ./mac
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            windows/VerificadorDUSA.exe
            mac/VerificadorDUSA-Mac.zip
          body: |
            ## Verificador DUSA - ${{ github.ref_name }}
            
            ### Descargas:
            - **Windows**: `VerificadorDUSA.exe`
            - **Mac**: `VerificadorDUSA-Mac.zip` (descomprimir y ejecutar)
            
            ### Requisitos:
            - Google Chrome instalado
            - Conexión a internet
            
            ---
            Powered by [TuPlanilla.net](https://tuplanilla.net)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
