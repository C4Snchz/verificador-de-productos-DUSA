name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow
      
      - name: Generate Windows icon
        run: |
          pip install cairosvg
          python -c "
          try:
              import cairosvg
              from PIL import Image
              import io
              png_data = cairosvg.svg2png(url='icon.svg', output_width=256, output_height=256)
              img = Image.open(io.BytesIO(png_data)).convert('RGBA')
              sizes = [(16, 16), (32, 32), (48, 48), (64, 64), (128, 128), (256, 256)]
              imgs = [img.resize(size, Image.LANCZOS) for size in sizes]
              imgs[0].save('icon.ico', format='ICO', append_images=imgs[1:])
              print('icon.ico created from SVG')
          except Exception as e:
              print(f'SVG conversion failed: {e}')
              from PIL import Image
              img = Image.new('RGBA', (256,256), (147,51,234,255))
              img.save('icon.ico', format='ICO')
              print('Created fallback icon')
          "
        shell: bash
      
      - name: Build Windows executable
        run: |
          pyinstaller --onefile --noconsole --name "VerificadorDUSA" --icon "icon.ico" --collect-all pandas --collect-all numpy --collect-all openpyxl --hidden-import=pandas._libs.tslibs.timedeltas --hidden-import=pandas._libs.tslibs.np_datetime --hidden-import=pandas._libs.tslibs.nattype --hidden-import=openpyxl.cell._writer app_escritorio_v2.py
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/VerificadorDUSA.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller cairosvg pillow
      
      - name: Generate Mac icon
        run: |
          python3 << 'EOF'
          try:
              import cairosvg
              from PIL import Image
              import io
              import os
              
              os.makedirs('icon.iconset', exist_ok=True)
              
              sizes = [16, 32, 64, 128, 256, 512]
              for size in sizes:
                  png_data = cairosvg.svg2png(url='icon.svg', output_width=size, output_height=size)
                  img = Image.open(io.BytesIO(png_data)).convert('RGBA')
                  img.save(f'icon.iconset/icon_{size}x{size}.png', 'PNG')
                  if size <= 256:
                      size2x = size * 2
                      png_data2x = cairosvg.svg2png(url='icon.svg', output_width=size2x, output_height=size2x)
                      img2x = Image.open(io.BytesIO(png_data2x)).convert('RGBA')
                      img2x.save(f'icon.iconset/icon_{size}x{size}@2x.png', 'PNG')
              print('iconset created')
          except Exception as e:
              print(f'Icon creation failed: {e}')
          EOF
          
          iconutil -c icns icon.iconset -o icon.icns 2>/dev/null || echo "iconutil skipped"
      
      - name: Build Mac executable
        run: |
          if [ -f icon.icns ]; then
            pyinstaller --onefile --noconsole --name "VerificadorDUSA" --icon "icon.icns" --collect-all pandas --collect-all numpy --collect-all openpyxl app_escritorio_v2.py
          else
            pyinstaller --onefile --noconsole --name "VerificadorDUSA" --collect-all pandas --collect-all numpy --collect-all openpyxl app_escritorio_v2.py
          fi
      
      - name: Create Mac ZIP
        run: |
          cd dist
          zip -r VerificadorDUSA-Mac.zip VerificadorDUSA
      
      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/VerificadorDUSA-Mac.zip

  create-release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: ./windows
      
      - name: Download Mac build
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: ./mac
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            windows/VerificadorDUSA.exe
            mac/VerificadorDUSA-Mac.zip
          body: |
            ## Verificador DUSA - ${{ github.ref_name }}
            
            ### Descargas:
            - **Windows**: `VerificadorDUSA.exe`
            - **Mac**: `VerificadorDUSA-Mac.zip` (descomprimir y ejecutar)
            
            ### Requisitos:
            - Google Chrome instalado
            - Conexión a internet
            
            ---
            Powered by [TuPlanilla.net](https://tuplanilla.net)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
